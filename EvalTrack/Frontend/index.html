<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvalTrack - Jose Maria College</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <link rel="icon" href="icon&logo/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b69 50%, #0f0518 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.4);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a78bfa;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 320px;
            margin: 0 auto 2.5rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(124, 58, 237, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: #a78bfa;
            border: 2px solid #7c3aed;
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.1);
            transform: translateY(-2px);
        }

        .portal-access {
            color: #8b5cf6;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .roles {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .role {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .role:hover {
            transform: translateY(-5px);
        }

        .role-icon {
            width: 60px;
            height: 60px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
            font-size: 1.5rem;
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .role-name {
            color: #e9d5ff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            color: #7c3aed;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .logo { width: 100px; height: 100px; }
            .roles { gap: 1.5rem; }
            .role-icon { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <img src="icon&logo/logo.png" alt="Jose Maria College" class="logo">
        
        <h1>EvalTrack</h1>
        <p class="subtitle">
            Academic Management System<br>
            Jose Maria College Foundation, Inc.
        </p>

        <div class="buttons">
            <a href="LoginPage/login.html" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login to Portal
            </a>
            <a href="LoginPage/register.html" class="btn btn-secondary">
                <i class="fas fa-user-plus"></i> Create Student Account
            </a>
        </div>

        <div class="portal-access">Portal Access:</div>
        <div class="roles">
            <div class="role">
                <div class="role-icon"><i class="fas fa-user-shield"></i></div>
                <div class="role-name">Admin</div>
            </div>
            <div class="role">
                <div class="role-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="role-name">Program Head</div>
            </div>
            <div class="role">
                <div class="role-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="role-name">Student</div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2025 Jose Maria College Foundation, Inc. All rights reserved.
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
